# =============================================================================
# VibeLyf API Worker — wrangler config
# =============================================================================
# Purpose: server-side proxy for LLM provider calls.
#   - Hides API keys (no more hardcoded keys in browser JS)
#   - Enables Anthropic prompt caching (90% cost reduction on the 535-term vocab)
#   - Wires Cerebras failover when Groq rate-limits
#   - Per-user rate limiting (wired in Phase 1.H part 2, after Supabase is live)
#
# Local dev:
#   1) cd worker && npm install
#   2) Copy .dev.vars.example → .dev.vars and fill in your dev API keys
#   3) npm run dev  → Worker runs at http://127.0.0.1:8787
#
# Production deploy:
#   1) wrangler login
#   2) npm run secret:set:gemini   (paste key when prompted)
#      ... repeat for anthropic, groq, cerebras
#   3) npm run deploy
#   4) In Cloudflare dashboard → Workers → vibelyf-api → Triggers,
#      add a route: vibelyf.com/api/*  → this worker
# =============================================================================

name = "vibelyf-api"
main = "src/index.js"
compatibility_date = "2026-05-22"
compatibility_flags = ["nodejs_compat"]

# Daily Supabase keep-alive (13:00 UTC). The free-tier project pauses after ~7
# days without activity — it went down exactly that way in June 2026 and took
# SPA auth with it. The scheduled handler runs a real authenticated query
# (counts as activity) and prunes stale rate_limits rows.
[triggers]
crons = ["0 13 * * *"]

# Cloudflare Workers AI — free-tier inference on CF's edge. This is the DEFAULT
# codegen engine so the AI features cost ~$0/user (within the free Neuron
# allocation); Claude is the paid fallback for image input + quality retries.
[ai]
binding = "AI"

# Default observability — log to wrangler tail / dashboard
[observability]
enabled = true

# Non-secret runtime config (override per environment if needed)
[vars]
# Allowed origins for CORS. Comma-separated. Production locks this to vibelyf.com.
# vibelyf.pages.dev is the live SPA host until vibelyf.com is bound (Task #24).
ALLOWED_ORIGINS = "https://vibelyf.com,https://www.vibelyf.com,https://vibelyf.pages.dev,http://localhost:8000,http://127.0.0.1:8000,http://localhost:5500,http://127.0.0.1:5500"
# Worker version, exposed via /api/health
WORKER_VERSION = "0.1.0"
# Per-IP rate limits. Primary enforcement = the native Cloudflare ratelimit
# bindings below (per-colo). These vars feed the in-memory FALLBACK limiter in
# src/lib/ratelimit.js (per-isolate), used only if the bindings are absent.
# "fast" routes (slang, embed) get RATE_LIMIT_PER_MINUTE; Claude-backed routes
# (codegen, api-gen) get the tighter RATE_LIMIT_HEAVY_PER_MINUTE — they cost real money.
RATE_LIMIT_PER_MINUTE = "60"
RATE_LIMIT_HEAVY_PER_MINUTE = "10"

# Native Workers rate-limiting bindings (per-colo enforcement, free).
# HEAVY = Claude-backed routes; FAST = slang/embed.
# NOTE: deploy with wrangler 4+ — the legacy [[unsafe.bindings]] form deployed
# without error on wrangler 3 but did NOT enforce (verified via live tail).
[[ratelimits]]
name = "HEAVY_LIMITER"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

[[ratelimits]]
name = "FAST_LIMITER"
namespace_id = "1002"
simple = { limit = 60, period = 60 }

# -----------------------------------------------------------------------------
# Secrets (set via `wrangler secret put <NAME>` — NEVER commit)
#   GEMINI_API_KEY       — Google AI Studio key for Gemini 3.5 Flash
#   ANTHROPIC_API_KEY    — Anthropic key for Claude Sonnet 4.6
#   GROQ_API_KEY         — Groq key for Llama 4 Maverick (primary fast brain)
#   CEREBRAS_API_KEY     — Cerebras key for Llama 4 Scout (failover)
#   SUPABASE_URL         — set in Phase 1.H part 2 once Supabase is up
#   SUPABASE_SERVICE_KEY — service role key for rate-limit + auth verify
# -----------------------------------------------------------------------------

# Production environment block (optional — uncomment if you want a separate prod config)
# [env.production]
# name = "vibelyf-api"
# routes = [
#   { pattern = "vibelyf.com/api/*", zone_name = "vibelyf.com" }
# ]
